type Proposal @entity {
  id: ID!
  proposer: Account!
  targets: [Bytes!]!
  values: [BigInt!]!
  calldatas: [Bytes!]!
  description: String!
  status: ProposalStatus!
  votes: [Vote!]! @derivedFrom(field: "proposal")
  createdBlock: BigInt!
  createdTimestamp: BigInt!
}

type Vote @entity {
  id: ID!
  proposal: Proposal!
  voter: Account!
  support: Int! # 0=Against, 1=For, 2=Abstain
  weight: BigInt!
  reason: String
}

type Account @entity {
  id: ID! # address
  delegatedVotes: BigInt!
  proposals: [Proposal!]! @derivedFrom(field: "proposer")
  votesCast: [Vote!]! @derivedFrom(field: "voter")
}

type GovernanceInfo @entity {
  id: ID! # "global"
  totalProposals: BigInt!
  totalVotesCast: BigInt!
}

enum ProposalStatus {
  Pending
  Active
  Canceled
  Defeated
  Succeeded
  Queued
  Expired
  Executed
}